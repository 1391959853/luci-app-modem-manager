name: Build and Release IPK

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install build dependencies
        run: |
          sudo apt update
          sudo apt install -y build-essential libncurses5-dev gawk git subversion libssl-dev gettext zlib1g-dev unzip python3 python3-distutils file

      - name: Clone OpenWrt (fanchmwrt)
        run: |
          git clone https://github.com/fanchmwrt/fanchmwrt.git openwrt
          cd openwrt
          ./scripts/feeds update -a
          ./scripts/feeds install -a

      - name: Copy package to OpenWrt tree
        run: |
          mkdir -p openwrt/package/luci-app-modem-manager
          cp -r Makefile root luasrc po openwrt/package/luci-app-modem-manager/

      - name: Configure OpenWrt
        run: |
          cd openwrt
          echo "CONFIG_TARGET_x86=y" >> .config
          echo "CONFIG_TARGET_x86_64=y" >> .config
          echo "CONFIG_PACKAGE_luci-app-modem-manager=y" >> .config
          make defconfig

      - name: Compile the package (verbose)
        run: |
          cd openwrt
          make package/luci-app-modem-manager/compile -j1 V=s

      - name: Locate IPK file
        id: ipk
        run: |
          IPK_PATH=$(find openwrt/bin/packages -name "luci-app-modem-manager_*.ipk" | head -n 1)
          echo "ipk_path=$IPK_PATH" >> $GITHUB_OUTPUT

      - name: Prepare release notes
        id: notes
        run: |
          if [ -n "${{ github.event.head_commit.message }}" ]; then
            echo "${{ github.event.head_commit.message }}" > release_notes.md
          else
            VERSION=${GITHUB_REF_NAME#v}
            if [ -f "CHANGELOG.md" ]; then
              awk -v ver="v${VERSION}" '
                BEGIN { flag=0; out="" }
                /^## \[/ {
                  if (flag) exit
                  if ($0 ~ "\\[?" ver "\\]?") flag=1
                  next
                }
                flag { out = out $0 "\n" }
                END { print out }
              ' CHANGELOG.md > release_notes.md
            fi
          fi
          if [ ! -s release_notes.md ]; then
            echo "## 安装说明\n\n下载 IPK 文件后，使用以下命令安装：\n\`\`\`bash\nopkg install luci-app-modem-manager_*.ipk\n\`\`\`" > release_notes.md
          fi
          echo "notes_path=release_notes.md" >> $GITHUB_OUTPUT

      - name: Create Release and Upload IPK
        uses: softprops/action-gh-release@v1
        with:
          files: ${{ steps.ipk.outputs.ipk_path }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          body_path: ${{ steps.notes.outputs.notes_path }}
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}